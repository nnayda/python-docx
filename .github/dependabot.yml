version: 2
updates:
  # uv ecosystem keeps uv.lock (and pyproject dependency groups) up to date.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
