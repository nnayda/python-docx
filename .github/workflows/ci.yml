name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (pyright, non-blocking)
    runs-on: ubuntu-latest
    # The pyright config aspires to strict mode, but a lot of the (forked)
    # source predates full type annotations and does not yet pass. This job
    # runs for signal but does not block merges; tighten it as the type debt
    # is paid down, then drop continue-on-error.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Pyright
        run: uv run pyright

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync

      - name: Unit tests (pytest)
        run: uv run pytest -q

      - name: Acceptance tests (behave)
        run: uv run behave --format progress --stop --tags=-wip
