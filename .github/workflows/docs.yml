name: Docs

# Builds the Sphinx documentation on every push/PR and publishes it to
# GitHub Pages from main. Enable Pages with "GitHub Actions" as the source
# in repository Settings → Pages.
on:
  push:
    branches: [main]
  pull_request:
  # Allow re-publishing docs on demand from the Actions tab (run from main).
  # The deploy job is still gated on the main branch below.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build HTML
        # --keep-going renders the whole site even if a page warns; we don't
        # use -W (fail-on-warning) here so a stray docstring warning from the
        # legacy source can't block publishing. Warnings still show in the log.
        run: |
          uv run --with-requirements requirements-docs.txt \
            sphinx-build -b html --keep-going docs docs/.build/html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.build/html

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
